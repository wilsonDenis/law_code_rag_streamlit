name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install browser
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Visit Streamlit app
        run: |
          python << 'SCRIPT'
          from playwright.sync_api import sync_playwright
          import sys

          url = "https://assistant-code-travail.streamlit.app"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()

              print(f"Opening {url} ...")
              page.goto(url, wait_until="domcontentloaded", timeout=120000)
              page.wait_for_timeout(5000)

              wake_btn = page.query_selector('button:has-text("Yes")')
              if wake_btn:
                  print("App is sleeping. Clicking wake up button...")
                  wake_btn.click()
                  print("Waiting 90s for app to start...")
                  page.wait_for_timeout(90000)
              else:
                  print("App is already awake.")

              page.wait_for_timeout(5000)
              title = page.title()
              print(f"Page title: {title}")
              browser.close()

          print("Done. App visited successfully.")
          SCRIPT
